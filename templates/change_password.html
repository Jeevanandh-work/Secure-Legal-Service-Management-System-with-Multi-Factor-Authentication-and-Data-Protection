{% extends "base.html" %}

{% block title %}Change Password - Secure Legal Service Platform{% endblock %}

{% block content %}
<section class="auth-shell auth-shell-center">
    <!-- Password change form -->
    <div class="auth-card reveal-up">
        <div class="section-title-wrap">
            <h2><i class="fa-solid fa-lock"></i> Change Password</h2>
            <span class="tag">Secure Update</span>
        </div>

        <p class="form-description">Use a strong new password. A confirmation notification is sent after the update.</p>

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="current_password">Current Password</label>
                <div class="input-icon-wrap">
                    <i class="fa-solid fa-key input-icon"></i>
                    <input type="password" id="current_password" name="current_password" required>
                </div>
            </div>

            <div class="form-group">
                <label for="new_password">New Password</label>
                <div class="input-icon-wrap">
                    <i class="fa-solid fa-shield input-icon"></i>
                    <input type="password" id="new_password" name="new_password" required minlength="8">
                </div>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <div class="input-icon-wrap">
                    <i class="fa-solid fa-check input-icon"></i>
                    <input type="password" id="confirm_password" name="confirm_password" required minlength="8">
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Update Password</button>
        </form>
    </div>
</section>
{% endblock %}
