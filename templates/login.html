{% extends "base.html" %}

{% block title %}Login - Secure Legal Service Platform{% endblock %}

{% block content %}
<section class="auth-shell auth-shell-center">
    <!-- Left panel: credential form -->
    <div class="auth-card reveal-up">
        <div class="section-title-wrap">
            <h2><i class="fa-solid fa-user-shield"></i> Secure Login</h2>
            <span class="tag">Secure Login 🔐</span>
        </div>

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="role">Login As:</label>
                <div class="input-icon-wrap">
                    <i class="fa-solid fa-user-tie input-icon"></i>
                    <select id="role" name="role" required>
                        <option value="">Select role</option>
                        <option value="client">Client</option>
                        <option value="lawyer">Lawyer</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address:</label>
                <div class="input-icon-wrap">
                    <i class="fa-solid fa-envelope input-icon"></i>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                        placeholder="your@email.com"
                        maxlength="120"
                    >
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password:</label>
                <div class="input-icon-wrap">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        placeholder="Enter your password"
                    >
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>

        <div class="auth-footer">
            <p>New to the platform? <a href="{{ url_for('register') }}">Create account</a></p>
        </div>
    </div>

</section>
{% endblock %}
